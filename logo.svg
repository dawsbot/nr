<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="80" fill="#0a0a0f" rx="8"/>

  <!-- "nr" text -->
  <text x="40" y="58"
        font-family="SF Mono, Monaco, Consolas, monospace"
        font-size="56"
        font-weight="900"
        fill="url(#textGradient)"
        filter="url(#glow)">nr</text>

  <!-- Speed bar -->
  <rect x="140" y="20" width="8" height="40" rx="4" fill="url(#barGradient)" filter="url(#glow)"/>

  <!-- Speed lines -->
  <line x1="155" y1="28" x2="175" y2="28" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="155" y1="40" x2="185" y2="40" stroke="#00ff88" stroke-width="2" opacity="0.4"/>
  <line x1="155" y1="52" x2="170" y2="52" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
</svg>
